<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLIXIT Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <!-- Left Girl -->
    <div class="left">
        <img src="girl.png" alt="Girl" class="girl">
    </div>

    <!-- Login Card -->
    <div class="card">

        <h1>FLIXIT</h1>
        <p class="tagline">STREAM. WATCH. ENJOY.</p>

        <h2>Welcome to Flixit!!</h2>

        <form id="loginForm">

            <input
            type="email"
            placeholder="Enter Email"
            required>

            <div class="password-box">

                <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

                <span id="eye">👁</span>

            </div>

            <button type="submit">
                SIGN IN →
            </button>

        </form>

        <div class="or">
            <span>OR</span>
        </div>

        <!-- <button class="google-btn">
            Continue with Google
        </button> -->

        <!-- <p class="create">
            New to Flixit?
            <a href="#">Create Account</a>
        </p> -->
<p class="create">
    New to Flixit?
    <a href="registration.html">Create Account</a>
</p>
    </div>

</div>

<script src="script.js"></script>
<!-- <script src="registration.js"></script> -->

</body>
</html>
